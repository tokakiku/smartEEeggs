<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>互动游戏：概念分类</title>
    <style>
        body { font-family: 'Microsoft YaHei', sans-serif; display: flex; flex-direction: column; align-items: center; background: #fff5f5; }
        .bins { display: flex; gap: 20px; margin-top: 30px; }
        .bin { width: 200px; min-height: 200px; border: 3px dashed #cbd5e0; border-radius: 10px; padding: 10px; display: flex; flex-direction: column; align-items: center; background: white; }
        .bin h3 { margin: 0 0 10px 0; color: #4a5568; }
        .items-pool { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 40px; max-width: 800px; }
        .item { padding: 10px 20px; background: #ed8936; color: white; border-radius: 20px; cursor: grab; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .item.dragging { opacity: 0.5; }
    </style>
</head>
<body>
    <h1>📦 概念分类收纳箱</h1>
    <p>请将下方的词条拖拽到正确的分类箱中！</p>

    <div class="bins" id="bins-container"></div>
    <div class="items-pool" id="items-pool"></div>

    <script>
        // 🚨 Python 注入占位符
        const GAME_DATA = /*INJECT_DATA*/;

        function initGame() {
            const binsContainer = document.getElementById('bins-container');
            const itemsPool = document.getElementById('items-pool');

            // 渲染收纳箱
            GAME_DATA.categories.forEach(cat => {
                const bin = document.createElement('div');
                bin.className = 'bin';
                bin.innerHTML = `<h3>${cat}</h3>`;
                bin.ondragover = e => e.preventDefault();
                bin.ondrop = e => handleDrop(e, cat);
                binsContainer.appendChild(bin);
            });

            // 渲染词条
            GAME_DATA.items.sort(() => Math.random() - 0.5).forEach((item, index) => {
                const el = document.createElement('div');
                el.className = 'item';
                el.innerText = item.word;
                el.draggable = true;
                el.ondragstart = e => {
                    e.dataTransfer.setData('text/plain', JSON.stringify({id: index, target: item.target}));
                    el.classList.add('dragging');
                    setTimeout(() => el.style.display = 'none', 0); // 拖动时原位置隐藏
                };
                el.ondragend = () => {
                    el.classList.remove('dragging');
                    el.style.display = 'block';
                };
                el.id = `item-${index}`;
                itemsPool.appendChild(el);
            });
        }

        function handleDrop(e, categoryName) {
            e.preventDefault();
            const data = JSON.parse(e.dataTransfer.getData('text/plain'));
            const el = document.getElementById(`item-${data.id}`);

            if (data.target === categoryName) {
                // 放对箱子了
                e.target.closest('.bin').appendChild(el);
                el.draggable = false; // 放进去就不能再拖了
                el.style.background = '#48bb78';
                el.style.cursor = 'default';
            } else {
                // 放错了
                alert("❌ 归类错误，再试试看！");
            }
        }

        initGame();
    </script>
</body>
</html>
